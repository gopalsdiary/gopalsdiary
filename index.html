<body>
  <!-- Minimal no-JS fallback -->
  <noscript>
    <style>
      .noscript-msg { font-family: sans-serif; text-align: center; padding: 40px; }
    </style>
    <div class="noscript-msg">
      <p>#</p>
    </div>
  </noscript>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Register custom service worker AFTER Flutter loads -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .then(reg => {
            // Prompt for update when a new SW is waiting
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available — you can show a toast here
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
