name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Flutter: analyze + test ──────────────────────────────────
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gallery_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lint)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: gallery_app-web
          path: gallery_app/build/web

      - name: Verify build does not reference photo_clicks
        run: |
          if grep -R --line-number "photo_clicks" gallery_app/build/web; then
            echo "photo_clicks reference found in build — failing";
            exit 1;
          else
            echo "No photo_clicks found in build";
          fi

  # ── Next.js: type-check + build ──────────────────────────────
  nextjs:
    name: Next.js Type-Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: with-typescript

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: with-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # ── HTML / CSS lint (static site) ────────────────────────────
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate key pages
        run: |
          html-validate home.html offline.html \
            --config '{"extends":["html-validate:recommended"],"rules":{"no-inline-style":"off","long-title":"off"}}'
        continue-on-error: true  # warn only — fix over time
