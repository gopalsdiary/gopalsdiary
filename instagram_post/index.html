<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Dashboard Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #334155;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 1px 3px 0 rgba(0, 0, 0, 0.1),
                0 20px 25px -5px rgba(0, 0, 0, 0.05),
                0 10px 10px -5px rgba(0, 0, 0, 0.02);
            text-align: center;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover .logo-icon {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 26px;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* Login Form */
        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border-color);
            background: #ffffff;
            font-size: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            color: var(--text-main);
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.15);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Portal View */
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .portal-btn {
            text-decoration: none;
            padding: 24px;
            border-radius: 18px;
            background: #ffffff;
            border: 1.5px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .portal-btn:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(59, 130, 246, 0.15);
        }

        .portal-btn .title {
            font-weight: 700;
            font-size: 17px;
            color: var(--text-main);
        }

        .portal-btn .desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .hidden { display: none !important; }

        #errorMsg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            min-height: 1.2em;
            font-weight: 500;
        }

        .logout-link {
            display: inline-block;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .logout-link:hover { color: #ef4444; }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Panel -->
        <div id="loginPanel" class="card">
            <div class="logo-area">
                <div class="logo-icon">📸</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Access your Instagram management portal</p>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button id="loginBtn" class="btn btn-primary">Sign In</button>
            <div id="errorMsg"></div>
        </div>

        <!-- Portal Panel -->
        <div id="portalPanel" class="card hidden">
            <div class="logo-area">
                <div class="logo-icon">✨</div>
                <h1>Select Account</h1>
                <p class="subtitle" id="userWelcome">Connected as admin</p>
            </div>

            <div class="portal-grid">
                <a href="kobitar_sohor/index.html" class="portal-btn">
                    <span class="title">kobitar_sohor</span>
                    <span class="desc">Manage poems and visual quotes</span>
                </a>
                <a href="gopals_diary/index.html" class="portal-btn">
                    <span class="title">Gopal's Diary Quote</span>
                    <span class="desc">Official diary post management</span>
                </a>
                <a href="bulk_add.html" class="portal-btn">
                    <span class="title">Bulk Add</span>
                    <span class="desc">Bulk add posts</span>
                </a>
            </div>

            <a class="logout-link" id="logoutBtn">Log Out</a>
            <p id="inactivityMsg" style="font-size: 10px; color: var(--text-muted); margin-top: 16px;">Auto-logout after 15m of inactivity</p>
        </div>
    </div>

    <!-- Auth Library dependency -->
    <script src="../admin/auth.js"></script>
    <script>
        const loginPanel = document.getElementById('loginPanel');
        const portalPanel = document.getElementById('portalPanel');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('errorMsg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const userWelcome = document.getElementById('userWelcome');


        // --- Inactivity Logic ---
        const INACTIVITY_LIMIT = 15 * 60 * 1000; // 15 minutes
        let inactivityTimer;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            if (supabase.getSession()) {
                inactivityTimer = setTimeout(forceLogout, INACTIVITY_LIMIT);
            }
        }

        async function forceLogout() {
            console.log("Inactivity logout triggered");
            await supabase.signOut();
            window.location.reload();
        }

        // --- Session Logic ---
        async function checkSession() {
            const session = supabase.getSession();
            if (session) {
                const user = JSON.parse(localStorage.getItem('supabase_user'));
                showPortal(user);
                resetInactivityTimer();
                setupInactivityListeners();
            } else {
                showLogin();
            }
        }

        function setupInactivityListeners() {
            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
                document.addEventListener(evt, resetInactivityTimer, true);
            });
        }

        function showPortal(user) {
            loginPanel.classList.add('hidden');
            portalPanel.classList.remove('hidden');
            if (user && user.email) {
                userWelcome.textContent = `Active: ${user.email}`;
            }
        }

        function showLogin() {
            loginPanel.classList.remove('hidden');
            portalPanel.classList.add('hidden');
        }

        // --- Event Listeners ---
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                errorMsg.textContent = 'Please fill all fields';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';
            errorMsg.textContent = '';

            try {
                const session = await supabase.signIn(email, password);
                window.location.reload(); // Reload to trigger session check and timers
            } catch (err) {
                errorMsg.textContent = err.message;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.signOut();
            window.location.reload();
        });

        // Handle ENTER key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !loginPanel.classList.contains('hidden')) {
                loginBtn.click();
            }
        });

        // Initialize
        checkSession();
    </script>
</body>
</html>
