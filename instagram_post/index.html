<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Dashboard Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 18px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3);
        }

        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* Login Form */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Portal View */
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .portal-btn {
            text-decoration: none;
            padding: 24px;
            border-radius: 16px;
            background: white;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .portal-btn:hover {
            border-color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .portal-btn .title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
        }

        .portal-btn .desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .hidden { display: none !important; }

        #errorMsg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            min-height: 1.2em;
        }

        .logout-link {
            display: block;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
        }

        .logout-link:hover { color: #ef4444; }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Panel -->
        <div id="loginPanel" class="card">
            <div class="logo-area">
                <div class="logo-icon">📸</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Access your Instagram management portal</p>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button id="loginBtn" class="btn btn-primary">Sign In</button>
            <div id="errorMsg"></div>
        </div>

        <!-- Portal Panel -->
        <div id="portalPanel" class="card hidden">
            <div class="logo-area">
                <div class="logo-icon">✨</div>
                <h1>Select Account</h1>
                <p class="subtitle" id="userWelcome">Connected as admin</p>
            </div>

            <div class="portal-grid">
                <a href="kobitar_sohor/index.html" class="portal-btn">
                    <span class="title">kobitar_sohor</span>
                    <span class="desc">Manage poems and visual quotes</span>
                </a>
                <a href="gopals_diary/index.html" class="portal-btn">
                    <span class="title">Gopal's Diary Quote</span>
                    <span class="desc">Official diary post management</span>
                </a>
            </div>

            <a class="logout-link" id="logoutBtn">Log Out</a>
            <p id="inactivityMsg" style="font-size: 10px; color: var(--text-muted); margin-top: 16px;">Auto-logout after 15m of inactivity</p>
        </div>
    </div>

    <!-- Auth Library dependency -->
    <script src="../admin/auth.js"></script>
    <script>
        const loginPanel = document.getElementById('loginPanel');
        const portalPanel = document.getElementById('portalPanel');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('errorMsg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const userWelcome = document.getElementById('userWelcome');


        // --- Inactivity Logic ---
        const INACTIVITY_LIMIT = 15 * 60 * 1000; // 15 minutes
        let inactivityTimer;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            if (supabase.getSession()) {
                inactivityTimer = setTimeout(forceLogout, INACTIVITY_LIMIT);
            }
        }

        async function forceLogout() {
            console.log("Inactivity logout triggered");
            await supabase.signOut();
            window.location.reload();
        }

        // --- Session Logic ---
        async function checkSession() {
            const session = supabase.getSession();
            if (session) {
                const user = JSON.parse(localStorage.getItem('supabase_user'));
                showPortal(user);
                resetInactivityTimer();
                setupInactivityListeners();
            } else {
                showLogin();
            }
        }

        function setupInactivityListeners() {
            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
                document.addEventListener(evt, resetInactivityTimer, true);
            });
        }

        function showPortal(user) {
            loginPanel.classList.add('hidden');
            portalPanel.classList.remove('hidden');
            if (user && user.email) {
                userWelcome.textContent = `Active: ${user.email}`;
            }
        }

        function showLogin() {
            loginPanel.classList.remove('hidden');
            portalPanel.classList.add('hidden');
        }

        // --- Event Listeners ---
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                errorMsg.textContent = 'Please fill all fields';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';
            errorMsg.textContent = '';

            try {
                const session = await supabase.signIn(email, password);
                window.location.reload(); // Reload to trigger session check and timers
            } catch (err) {
                errorMsg.textContent = err.message;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.signOut();
            window.location.reload();
        });

        // Handle ENTER key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !loginPanel.classList.contains('hidden')) {
                loginBtn.click();
            }
        });

        // Initialize
        checkSession();
    </script>
</body>
</html>
