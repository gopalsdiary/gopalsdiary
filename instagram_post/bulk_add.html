<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Add - Instagram Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Cropper.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        /* Base styles from the existing design system */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 18px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        select, textarea, input[type="text"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        select:focus, textarea:focus, input:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        
        .grid { display: grid; gap: 16px; grid-template-columns: 1fr; margin-top: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .item-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; background: white; display: flex; flex-direction: column; gap: 10px; }
        .item-row { display: flex; gap: 15px; }
        .item-img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #e2e8f0; }
        .item-details { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 600; align-self: flex-start; }
        .status-checking { background: #e0f2fe; color: #0369a1; }
        .status-attention { background: #fee2e2; color: #b91c1c; }
        .status-ready { background: #f3e8ff; color: #7e22ce; }
        .status-uploading { background: #fef08a; color: #854d0e; }
        .status-uploaded { background: #dcfce3; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .hidden { display: none !important; }

        .global-controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; background: #f1f5f9; padding: 15px; border-radius: var(--radius); margin-bottom: 20px;}

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .tab-btn {
            white-space: nowrap;
            background: #f1f5f9;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            border: 1px solid transparent;
            flex: none;
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Bulk Add Instagram Posts</h2>
        
        <div class="global-controls">
            <div>
                <label>Set Global Section (Applies to all)</label>
                <select id="globalSection" onchange="applyGlobalSection()">
                    <option value="">-- Select --</option>
                    <option value="gopalsdiary">Gopal's Diary</option>
                    <option value="mehedi">Mehedi</option>
                    <option value="kobir">Kobir</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div>
                <label>Global Actions</label>
                <button class="btn btn-ghost" onclick="applyGlobalCaption()">📋 Apply Custom 1 to All</button>
            </div>
        </div>

        <div class="form-group">
            <label class="btn btn-secondary" style="cursor: pointer; display: inline-flex;">
                📁 Choose Multiple Images
                <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleFiles(event)">
            </label>
            <span id="fileCount" style="margin-left: 10px; font-size: 14px; font-weight: 600;">0 files selected</span>
        </div>

        <div id="itemsGrid" class="grid"></div>

        <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px;">
            <a href="bulk_add.html" class="btn btn-ghost" style="text-decoration: none;">Cancel</a>
            <button id="saveAllBtn" class="btn btn-primary" onclick="saveAllToDatabase()" disabled>Save All to Database</button>
        </div>
        <div id="saveStatus" style="text-align: right; margin-top: 10px; font-size: 14px; font-weight: 600;"></div>
    </div>
</div>

<!-- Premium Cropper Modal -->
<div id="cropperModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0; font-size: 18px;">Adjust Image</h3>
            <button class="btn-ghost" style="padding: 4px 8px;" onclick="closeCropper()">&times;</button>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
            <button class="tab-btn ratio-btn active" onclick="setRatio(0.8)">4:5</button>
            <button class="tab-btn ratio-btn" onclick="setRatio(1)">1:1</button>
            <button class="tab-btn ratio-btn" onclick="setRatio(1.91)">1.91:1</button>
            <button class="btn-ghost" style="font-size: 12px; margin-left: auto;" onclick="fitImage()">🔳 Fit</button>
        </div>

        <div style="width: 100%; height: 400px; background: #f1f5f9; border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
            <img id="cropImage" src="" style="max-width: 100%; display: block;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-secondary" onclick="closeCropper()">Cancel</button>
            <button id="saveCropBtn" class="btn-primary" onclick="applyCrop()">Apply Crop</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="../admin/auth.js"></script>
<script>
    const CUSTOM_CAPTION_1 = `বুঝলে, প্রিয় !?\n*\n#banglatypography\n#banglaquotes\n#kolkata\n#kolkatasutra\n#bengaliquotes\n#kolkatadiaries\n#bengaliquote\n#banglacaligraphy\n#bengali\n#dhakagram\n#gopals_diary\n#bdquotes\n#aesthetically\n#banglagram\n#dhakadiaries\n#banglakobita\n#bongquotes\n#bengalipoem\n#dhakagraam\n#kolkatagram\n#bongoquotes\n#kolkataquotes\n#bengalipoetry-Kolkata 🥰❤`;

    let itemsData = [];

    // Compress Base64 Image if > 470kb
    async function compressBase64(base64Data, targetKB = 470) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = base64Data;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                let quality = 0.95;
                let resultData = base64Data;
                let currentKB = (resultData.length * 3 / 4) / 1024;

                if (currentKB <= targetKB) {
                    resolve(resultData);
                    return;
                }

                while (currentKB > targetKB && quality > 0.1) {
                    resultData = canvas.toDataURL('image/jpeg', quality);
                    currentKB = (resultData.length * 3 / 4) / 1024;
                    quality -= 0.05;
                }
                resolve(resultData);
            };
            img.onerror = () => resolve(base64Data);
        });
    }

    // Convert File to Base64
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // Upload directly to Supabase Storage
    async function uploadBase64ToBucket(base64Data, fileName) {
        const session = supabase.getSession();
        if (!session) throw new Error("Not logged in!");

        const token = session.access_token || SUPABASE_ANON_KEY;
        const base64Content = base64Data.split(',')[1];
        const byteCharacters = atob(base64Content);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: 'image/jpeg' });

        const bucketName = 'insta_post_bucket';
        const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${bucketName}/${fileName}`;

        const response = await fetch(uploadUrl, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'apikey': SUPABASE_ANON_KEY,
                'Content-Type': 'image/jpeg',
                'x-upsert': 'true'
            },
            body: blob
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || 'Upload failed');
        }

        return `${SUPABASE_URL}/storage/v1/object/public/${bucketName}/${fileName}`;
    }

    async function handleFiles(event) {
        const files = Array.from(event.target.files);
        if(!files.length) return;
        
        const globalSection = document.getElementById('globalSection').value || 'other';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const itemId = 'item_' + Date.now() + '_' + i;
            
            const newItem = {
                id: itemId,
                base64: null,
                previewUrl: null,
                imageUrl: null,
                caption: '',
                section: globalSection,
                status: 'checking'
            };
            itemsData.push(newItem);
        }
        
        document.getElementById('fileCount').textContent = `${itemsData.length} files total`;
        renderGrid();

        for (let item of itemsData.filter(i => i.status === 'checking')) {
            await checkImageRatio(item, files.find(f => f.name === (item._filename || '') ) || files[itemsData.indexOf(item)]);
        }
        
        event.target.value = ''; // Reset input
    }

    async function checkImageRatio(item, file) {
        try {
            const base64 = await fileToBase64(file);
            item.base64 = base64;
            item.previewUrl = base64;
            
            const img = new Image();
            img.src = base64;
            await new Promise((resolve, reject) => {
                img.onload = () => resolve();
                img.onerror = () => reject('Load error');
            });
            
            const ratio = img.width / img.height;
            // Instagram ratio requirement: 0.8 (4:5) to 1.91 (1.91:1)
            if (ratio >= 0.79 && ratio <= 1.92) {
                item.status = 'ready';
            } else {
                item.status = 'attention';
            }
        } catch (e) {
            console.error(e);
            item.status = 'error';
        }
        renderGrid();
        checkAndStartUploads();
    }

    async function checkAndStartUploads() {
        // If there are items still checking or needing attention, do not upload yet.
        if (itemsData.some(i => i.status === 'checking' || i.status === 'attention')) {
            checkAllUploaded(); 
            return;
        }
        
        // Find ready items and start uploading
        for (let item of itemsData) {
            if (item.status === 'ready') {
                item.status = 'uploading';
                renderGrid();
                processUpload(item); // runs async without blocking
            }
        }
    }

    async function processUpload(item) {
        try {
            const compressedBase64 = await compressBase64(item.base64, 470);
            const fileName = `bulk_${Date.now()}_${Math.floor(Math.random() * 1000)}.jpg`;
            const uploadedUrl = await uploadBase64ToBucket(compressedBase64, fileName);
            
            item.imageUrl = uploadedUrl;
            item.status = 'uploaded';
            
            renderGrid();
            checkAllUploaded();
        } catch (error) {
            console.error(error);
            item.status = 'error';
            renderGrid();
            checkAllUploaded();
        }
    }

    function renderGrid() {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = itemsData.map((item) => {
            const statusLabel = 
                item.status === 'checking' ? 'Checking...' :
                item.status === 'attention' ? 'Attention' :
                item.status === 'ready' ? 'Ready to Upload' :
                item.status === 'uploading' ? 'Uploading...' :
                item.status === 'uploaded' ? 'Uploaded' : 'Error';

            return `
                <div class="item-card" id="${item.id}">
                    <div class="item-row">
                        <img src="${item.previewUrl || ''}" class="item-img-preview" />
                        <div class="item-details">
                            <span class="status-badge status-${item.status}">
                                ${statusLabel}
                            </span>
                            ${item.status === 'attention' ? `<button class="btn btn-ghost" style="padding: 4px 8px; font-size: 11px; margin-top: 4px; border-color: #ef4444; color: #ef4444;" onclick="openCropper('${item.id}')">Crop Image</button>` : ''}
                            <select onchange="updateItemData('${item.id}', 'section', this.value)">
                                <option value="gopalsdiary" ${item.section === 'gopalsdiary' ? 'selected' : ''}>Gopal's Diary</option>
                                <option value="mehedi" ${item.section === 'mehedi' ? 'selected' : ''}>Mehedi</option>
                                <option value="kobir" ${item.section === 'kobir' ? 'selected' : ''}>Kobir</option>
                                <option value="other" ${item.section === 'other' ? 'selected' : ''}>Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <textarea placeholder="Write caption here..." rows="4" onchange="updateItemData('${item.id}', 'caption', this.value)">${item.caption}</textarea>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateItemData(id, field, value) {
        const item = itemsData.find(i => i.id === id);
        if(item) {
            item[field] = value;
        }
    }

    function applyGlobalSection() {
        const val = document.getElementById('globalSection').value;
        if(!val) return;
        itemsData.forEach(item => {
            item.section = val;
            const itemEl = document.getElementById(item.id);
            if(itemEl) {
                const select = itemEl.querySelector('select');
                if(select) select.value = val;
            }
        });
    }

    function applyGlobalCaption() {
        itemsData.forEach(item => {
            const current = item.caption.trim();
            item.caption = (current ? current + '\\n\\n' : '') + CUSTOM_CAPTION_1;
            const itemEl = document.getElementById(item.id);
            if(itemEl) {
                const textarea = itemEl.querySelector('textarea');
                if(textarea) textarea.value = item.caption;
            }
        });
    }

    function checkAllUploaded() {
        const everythingProcessed = itemsData.length > 0 && itemsData.every(i => i.status === 'uploaded' || i.status === 'error');
        const anyUploaded = itemsData.some(i => i.status === 'uploaded');
        document.getElementById('saveAllBtn').disabled = !everythingProcessed || !anyUploaded;
    }

    async function saveAllToDatabase() {
        const btn = document.getElementById('saveAllBtn');
        const statusTxt = document.getElementById('saveStatus');
        
        btn.disabled = true;
        btn.textContent = 'Saving...';
        statusTxt.textContent = '';
        statusTxt.style.color = 'var(--text-main)';

        let successCount = 0;
        let failCount = 0;

        for (const item of itemsData) {
            if (item.status !== 'uploaded' || !item.imageUrl) continue;

            const payload = {
                image_url: item.imageUrl,
                caption: item.caption,
                platform: 'instagram',
                status_kobitar_sohor: 'pending',
                status_gopals_diary: 'pending',
                post_section: item.section || 'other'
            };

            try {
                await supabase.request('z_insta_post_db', 'POST', payload);
                successCount++;
            } catch (err) {
                console.error('Failed to save', item.id, err);
                failCount++;
            }
        }

        if (failCount === 0) {
            statusTxt.style.color = '#166534';
            statusTxt.textContent = `Successfully saved ${successCount} posts! Redirecting...`;
            setTimeout(() => {
                window.location.href = 'bulk_add.html'; 
            }, 1500);
        } else {
            statusTxt.style.color = '#991b1b';
            statusTxt.textContent = `Saved ${successCount}, Failed ${failCount}. Check console.`;
            btn.disabled = false;
            btn.textContent = 'Retry Failed';
            
            // Allow retry of unsaved ones but we don't track it deeply here just fail and let them manually re-attempt
        }
    }

    // --- CROPPER LOGIC ---
    let currentCropItemId = null;
    let cropper = null;

    function openCropper(itemId) {
        const item = itemsData.find(i => i.id === itemId);
        if(!item) return;

        currentCropItemId = itemId;
        const modal = document.getElementById('cropperModal');
        const imgEl = document.getElementById('cropImage');
        
        imgEl.src = item.base64;
        modal.classList.add('active');

        if(cropper) cropper.destroy();
        
        cropper = new Cropper(imgEl, {
            aspectRatio: 0.8, // 4:5
            viewMode: 0,
            background: false,
            responsive: true,
            guides: true,
            center: true,
            autoCropArea: 1,
        });
    }

    function setRatio(ratio) {
        if(cropper) cropper.setAspectRatio(ratio);
        const btns = document.querySelectorAll('.ratio-btn');
        btns.forEach(b => b.classList.remove('active'));
        if(window.event && window.event.target) {
            window.event.target.classList.add('active');
        }
    }

    function fitImage() {
        if (!cropper) return;
        const cropBoxData = cropper.getCropBoxData();
        const imageData = cropper.getImageData();
        const scale = Math.min(
            cropBoxData.width / imageData.naturalWidth,
            cropBoxData.height / imageData.naturalHeight
        );
        cropper.zoomTo(scale);
        setTimeout(() => {
            const newImageData = cropper.getImageData();
            cropper.moveTo(
                cropBoxData.left + (cropBoxData.width - newImageData.width) / 2,
                cropBoxData.top + (cropBoxData.height - newImageData.height) / 2
            );
        }, 50);
    }
    
    function closeCropper() {
        const modal = document.getElementById('cropperModal');
        modal.classList.remove('active');
        if(cropper) {
            cropper.destroy();
            cropper = null;
        }
    }

    function applyCrop() {
        if(!cropper || !currentCropItemId) return;
        const canvas = cropper.getCroppedCanvas();
        const croppedBase64 = canvas.toDataURL('image/jpeg', 0.95);
        
        const item = itemsData.find(i => i.id === currentCropItemId);
        if(item) {
            item.base64 = croppedBase64;
            item.previewUrl = croppedBase64;
            item.status = 'ready'; 
        }
        
        closeCropper();
        renderGrid();
        checkAndStartUploads();
    }

    // Initialize session validation
    document.addEventListener('DOMContentLoaded', () => {
        if (!supabase.getSession()) {
            console.warn('No session found. Redirecting to login.');
            window.location.href = 'index.html';
        }
    });

</script>
</body>
</html>
