<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Bangla Quotes - Gopals Diary</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* CSS from bangla_style.css */
        :root {
            --primary-color: #eeb600;
            --primary-variant: #3700b3;
            --secondary-color: #03dac6;
            --background-color: #f5f5f5;
            --surface-color: #ffffff;
            --error-color: #b00020;
            --on-primary: #ffffff;
            --on-surface: #000000;
            --elevation-1: 0 1px 1px 0 rgba(0, 0, 0, 0.14), 0 2px 1px -1px rgba(0, 0, 0, 0.12), 0 1px 3px 0 rgba(0, 0, 0, 0.20);
            --elevation-2: 0 3px 4px 0 rgba(0, 0, 0, 0.14), 0 3px 3px -2px rgba(0, 0, 0, 0.12), 0 1px 8px 0 rgba(0, 0, 0, 0.20);
            --elevation-4: 0 2px 4px -1px rgba(0, 0, 0, 0.2), 0 4px 5px 0 rgba(0, 0, 0, 0.14), 0 1px 10px 0 rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--background-color);
            color: var(--on-surface);
            line-height: 1.5;
        }

        .app-bar {
            background-color: var(--primary-color);
            color: var(--on-primary);
            position: relative;
            z-index: 1000;
            box-shadow: var(--elevation-4);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .app-bar-content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.15px;
        }

        .spacer {
            flex-grow: 1;
        }

        .icon-button {
            color: inherit;
            text-decoration: none;
            padding: 12px;
            border-radius: 50%;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .photo-card {
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: var(--elevation-1);
            transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .photo-card:hover {
            box-shadow: var(--elevation-2);
            transform: translateY(-2px);
        }

        .photo-image {
            width: 100%;
            aspect-ratio: 16 / 10;
            position: relative;
            background-color: #eee;
            overflow: hidden;
        }

        .photo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-image img.loaded {
            opacity: 1;
        }

        .photo-info {
            padding: 6px 8px;
            background-color: var(--surface-color);
        }

        .photo-info h3 {
            font-size: 11px;
            font-weight: 400;
            margin: 0;
            line-height: 1.2;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .photo-info p {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6);
            letter-spacing: 0.2px;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .circular-progress {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(98, 0, 238, 0.2);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
            gap: 16px;
        }

        .fab.mini {
            width: 40px;
            height: 40px;
            background-color: var(--secondary-color);
            color: #000;
            border: none;
            border-radius: 50%;
            box-shadow: var(--elevation-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
        }

        .fab.mini:hover { background-color: #04efd9; transform: scale(1.1); }
        .fab.mini:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .page-numbers { display: flex; gap: 8px; flex-wrap: wrap; }
        .page-number {
            border: none;
            background: transparent;
            min-width: 32px;
            height: 32px;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .page-number.active { background-color: var(--primary-color); color: white; }
        .page-number:hover:not(.active) { background-color: rgba(0, 0, 0, 0.05); }

        .lightbox-overlay {
            position: fixed; inset: 0;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-overlay.active { opacity: 1; pointer-events: auto; }

        .lightbox-content {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            max-width: 96vw;
            max-height: 94vh;
            width: 1400px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .lightbox-overlay.active .lightbox-content { transform: scale(1); }

        .lightbox-image-wrapper {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 300px;
        }
        .lightbox-image-wrapper img {
            max-width: 100%;
            max-height: 94vh;
            object-fit: contain;
            transition: opacity 0.3s;
            filter: drop-shadow(0 12px 32px rgba(0,0,0,0.3));
        }

        .lightbox-details {
            flex: 0 0 320px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow-y: auto;
            color: rgba(255,255,255,0.9);
            border-left: 1px solid rgba(255,255,255,0.08);
        }

        .lightbox-details h2 { font-size: 22px; margin-bottom: 8px; color: #fff; }
        .lightbox-details #lightboxDescription { font-size: 14px; color: rgba(255,255,255,0.7); flex: 1; }

        .lightbox-controls {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-flex;
            gap: 6px;
            margin: 10px 0;
        }

        .btn-download {
            background: var(--primary-color);
            color: #1a1a1a;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 20px;
        }

        .close-btn, .nav-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .close-btn { position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; font-size: 24px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 52px; height: 52px; }
        .nav-btn.prev { left: 20px; }
        .nav-btn.next { right: 20px; }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .photo-image { aspect-ratio: 1 / 1; }
            .container { padding: 0 4px; }
            .photo-card { border-radius: 4px; }
            .photo-info p { display: none; }
            
            .lightbox-content { flex-direction: column; inset: 0; position: fixed; max-height: 100vh; max-width: 100vw; border-radius: 0; }
            .lightbox-image-wrapper { height: 100vh; width: 100vw; }
            .lightbox-details {
                position: absolute; bottom: 0; left: 0; width: 100%;
                background: rgba(20, 20, 20, 0.85);
                border-top-left-radius: 28px; border-top-right-radius: 28px;
                transform: translateY(calc(100% - 110px));
                transition: transform 0.4s;
            }
            .lightbox-details.expanded { transform: translateY(0); }
            .nav-btn { bottom: 24px; top: auto; transform: none; }
            .btn-download { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 44px; height: 44px; border-radius: 50%; font-size: 0; }
            
            .lightbox-overlay.ui-hidden .lightbox-details { transform: translateY(100%) !important; }
            .lightbox-overlay.ui-hidden .close-btn, .lightbox-overlay.ui-hidden .nav-btn, .lightbox-overlay.ui-hidden .btn-download { opacity: 0; pointer-events: none; }
        }
    </style>
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-content">
            <span class="material-icons" style="margin-right: 20px; cursor: pointer;">menu</span>
            <h1 class="app-title" id="appTitle">Gopals Diary</h1>
            <div class="spacer"></div>
            <a href="../home.html" class="icon-button"><span class="material-icons">home</span></a>
        </div>
    </header>

    <main class="container">
        <div id="gallery" class="gallery-grid"></div>
        <div id="loading" class="loading-indicator">
            <div class="circular-progress"></div>
            <p style="margin-top: 10px; color: #666;">Loading photos...</p>
        </div>
        <div class="pagination-container">
            <button id="prevBtn" class="fab mini"><span class="material-icons">chevron_left</span></button>
            <div id="pageNumbers" class="page-numbers"></div>
            <button id="nextBtn" class="fab mini"><span class="material-icons">chevron_right</span></button>
        </div>
    </main>

    <div id="lightbox" class="lightbox-overlay">
        <div class="lightbox-content">
            <button class="close-btn" onclick="closeLightbox()"><span class="material-icons">close</span></button>
            <div class="lightbox-image-wrapper">
                 <img id="lightboxImage" src="" alt="View">
                 <button class="nav-btn prev" onclick="prevImage()"><span class="material-icons">arrow_back</span></button>
                 <button class="nav-btn next" onclick="nextImage()"><span class="material-icons">arrow_forward</span></button>
            </div>
            <div class="lightbox-details">
                <h2 id="lightboxTitle">Title</h2>
                <div class="lightbox-controls">Image <span id="imageCounter">1</span> of <span id="totalCounter">1</span></div>
                <p id="lightboxDescription">Description</p>
                <div style="margin-top: auto;">
                    <button class="btn-download" onclick="downloadImage()"><span class="material-icons">download</span> Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* Table and Title Management */
        const urlParams = new URLSearchParams(window.location.search);
        const table = urlParams.get('table') || 'bangla_quotes_1';
        const tableNames = {
            'bangla_quotes_1': 'Bangla Quotes 1', 'bangla_quotes_2': 'Bangla Quotes 2',
            'bangla_quotes_3': 'Bangla Quotes 3', 'bangla_quotes_4': 'Bangla Quotes 4',
            'photography_1': 'Photography 1', 'photography_2': 'Photography 2',
            'photography_3': 'Photography 3', 'photography_4': 'Photography 4',
            'english_quotes_1': 'English Quotes 1', 'english_quotes_2': 'English Quotes 2',
            'illustration_1': 'Illustration 1', 'illustration_2': 'Illustration 2',
            'dotted_illustration_1': 'Dotted Illustration 1', 'dotted_illustration_2': 'Dotted Illustration 2'
        };
        const displayName = tableNames[table] || table.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        document.title = displayName + ' - Gopals Diary';
        document.getElementById('appTitle').textContent = displayName;
        window.TABLE_NAME = table;
        window.PHOTOS_PER_PAGE = 100;

        /* Supabase & Logic */
        const SUPABASE_URL = 'https://mwkoqxtyxdkkqlakrrvd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13a29xeHR5eGRra3FsYWtycnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2NzYzODcsImV4cCI6MjA4MjI1MjM4N30.2SvderBmI6Ick5Z91M4hrmJwKuXQZmvwWxQOpZod1kg';

        class ImageOptimizer {
            static isMobile() { return window.innerWidth <= 768; }
            static getOptimizedUrl(url, options = {}) {
                if (!url) return '';
                if (url.includes('supabase.co/storage')) {
                    const params = new URL(url).searchParams;
                    params.set('width', options.width || 800);
                    params.set('quality', options.quality || 75);
                    params.set('format', 'webp');
                    return url.split('?')[0] + '?' + params.toString();
                }
                return url;
            }
            static getThumbnailUrl(url) { return this.getOptimizedUrl(url, { width: this.isMobile() ? 180 : 300, quality: 50 }); }
            static getGalleryUrl(url) { return this.getOptimizedUrl(url, { width: this.isMobile() ? 600 : 800, quality: 75 }); }
            static getLightboxUrl(url) { return this.getOptimizedUrl(url, { width: this.isMobile() ? 1200 : 1920, quality: 85 }); }
        }

        class SupabaseClient {
            constructor(url, key) { this.url = url; this.key = key; }
            async request(path, options = {}) {
                const res = await fetch(`${this.url}/rest/v1${path}`, {
                    headers: { 'apikey': this.key, 'Authorization': `Bearer ${this.key}`, ...options.headers }
                });
                return options.full ? { data: await res.json(), res } : res.json();
            }
            async getPhotos(limit, offset, table) {
                const res = await this.request(`/${table}?select=*&order=image_iid.asc`, {
                    headers: { 'Range': `${offset}-${offset+limit-1}`, 'Prefer': 'count=exact' },
                    full: true
                });
                const count = res.res.headers.get('Content-Range')?.split('/')[1] || 0;
                return { photos: res.data, total: parseInt(count) };
            }
        }

        const supabase = new SupabaseClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const imageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                    imageObserver.unobserve(img);
                }
            });
        }, { rootMargin: '300px' });

        let currentPage = 1, totalPhotos = 0, allPhotos = [], currentImageIndex = 0;

        document.addEventListener('DOMContentLoaded', () => { loadPhotos(); setupListeners(); });
        function setupListeners() {
            document.getElementById('prevBtn').onclick = () => { if(currentPage > 1) { currentPage--; loadPhotos(); } };
            document.getElementById('nextBtn').onclick = () => { if(currentPage * window.PHOTOS_PER_PAGE < totalPhotos) { currentPage++; loadPhotos(); } };
            document.addEventListener('keydown', (e) => {
                if(e.key === 'Escape') closeLightbox();
                if(e.key === 'ArrowRight') nextImage();
                if(e.key === 'ArrowLeft') prevImage();
            });
            document.getElementById('lightbox').onclick = (e) => { if(e.target.id === 'lightbox') closeLightbox(); };
            
            /* Swipe support */
            let startX = 0;
            document.getElementById('lightbox').ontouchstart = (e) => startX = e.touches[0].clientX;
            document.getElementById('lightbox').ontouchend = (e) => {
                const diff = startX - e.changedTouches[0].clientX;
                if(Math.abs(diff) > 50) diff > 0 ? nextImage() : prevImage();
            };
            
            /* Bottom Sheet Toggle */
            document.getElementById('lightboxImage').onclick = () => {
                if(ImageOptimizer.isMobile()) document.querySelector('.lightbox-details').classList.toggle('expanded');
            };
        }

        async function loadPhotos() {
            const gallery = document.getElementById('gallery'), loading = document.getElementById('loading');
            loading.style.display = 'block'; gallery.innerHTML = '';
            try {
                const result = await supabase.getPhotos(window.PHOTOS_PER_PAGE, (currentPage-1)*window.PHOTOS_PER_PAGE, window.TABLE_NAME);
                totalPhotos = result.total; allPhotos = result.photos;
                result.photos.forEach((p, i) => gallery.appendChild(createCard(p, i)));
                updatePagination();
            } catch(e) { console.error(e); }
            finally { loading.style.display = 'none'; }
        }

        function createCard(photo, i) {
            const card = document.createElement('div'); card.className = 'photo-card';
            const thumb = ImageOptimizer.getThumbnailUrl(photo.thumbnail_url || photo.image_url);
            card.innerHTML = `<div class="photo-image"><img data-src="${thumb}" alt=""></div>
                             <div class="photo-info"><h3>${photo.title || ''}</h3></div>`;
            imageObserver.observe(card.querySelector('img'));
            card.onclick = () => openLightbox(i);
            return card;
        }

        function openLightbox(i) {
            currentImageIndex = i;
            const p = allPhotos[i];
            const img = document.getElementById('lightboxImage');
            img.src = ImageOptimizer.getLightboxUrl(p.thumbnail_url || p.image_url);
            document.getElementById('lightboxTitle').textContent = p.title || '';
            document.getElementById('lightboxDescription').textContent = p.description || '';
            document.getElementById('imageCounter').textContent = i + 1;
            document.getElementById('totalCounter').textContent = allPhotos.length;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function nextImage() { if(currentImageIndex < allPhotos.length-1) openLightbox(++currentImageIndex); }
        function prevImage() { if(currentImageIndex > 0) openLightbox(--currentImageIndex); }

        async function downloadImage() {
            const p = allPhotos[currentImageIndex];
            const res = await fetch(p.image_url);
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = (p.title || 'image') + '.jpg';
            a.click(); URL.revokeObjectURL(url);
        }

        function updatePagination() {
            const max = Math.ceil(totalPhotos / window.PHOTOS_PER_PAGE);
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= max;
            const p = document.getElementById('pageNumbers'); p.innerHTML = '';
            for(let i=1; i<=max; i++) {
                const b = document.createElement('button'); b.className = 'page-number' + (i===currentPage?' active':'');
                b.textContent = i; b.onclick = () => { currentPage = i; loadPhotos(); };
                p.appendChild(b);
            }
        }
    </script>
</body>
</html>
