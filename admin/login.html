<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Admin Login - Gopals Diary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-light: #f8fafc;
            --panel: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.05) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.05) 0, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glow for light mode */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            z-index: -1;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                0 20px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 48px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand img {
            height: 62px;
            margin-bottom: 16px;
            border-radius: 14px;
            padding: 4px;
            border: 1px solid var(--border);
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .muted {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 32px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            margin-left: 2px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        input {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 15px;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
            background: #fff;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .helper {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 14px;
            text-align: center;
            display: block;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        button[type="submit"]:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .error, .success {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
        }

        .success {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #dcfce7;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <h1>Admin Access</h1>
        </div>
        <p class="muted">Enter your credentials to manage Gopals Diary dashboard securely.</p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" placeholder="name@company.com" autocomplete="email" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>

            <button id="submitBtn" type="submit">Sign In to Dashboard</button>
            
            <span class="helper">Secure encrypted session will be established.</span>

            <div id="errorBox" class="error"></div>
            <div id="successBox" class="success">Login successful. Redirecting…</div>
        </form>
    </div>

	<!-- Supabase JS v2 -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script>
		// Prevent script from running multiple times
		if (!window.loginScriptLoaded) {
			window.loginScriptLoaded = true;

			// Your Supabase project settings
			const SUPABASE_URL = 'https://mwkoqxtyxdkkqlakrrvd.supabase.co';
			const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13a29xeHR5eGRra3FsYWtycnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2NzYzODcsImV4cCI6MjA4MjI1MjM4N30.2SvderBmI6Ick5Z91M4hrmJwKuXQZmvwWxQOpZod1kg';

			// Create client (reuse if already exists)
			if (!window.supabaseClient) {
				window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
			}
			const supabase = window.supabaseClient;

			// Helpers
			const errorBox = document.getElementById('errorBox');
			const successBox = document.getElementById('successBox');
			const submitBtn = document.getElementById('submitBtn');
			const form = document.getElementById('loginForm');

		// ── Brute-force rate limiting (client-side) ───────────────────
		const RATE_LIMIT_KEY  = 'gopals_login_attempts';
		const LOCKOUT_KEY     = 'gopals_login_lockout';
		const MAX_ATTEMPTS    = 5;
		const LOCKOUT_MINUTES = 10;

		function getRateLimit() {
			return {
				attempts: parseInt(sessionStorage.getItem(RATE_LIMIT_KEY) || '0', 10),
				lockedUntil: parseInt(sessionStorage.getItem(LOCKOUT_KEY) || '0', 10)
			};
		}

		function bumpAttempt() {
			let { attempts } = getRateLimit();
			attempts += 1;
			sessionStorage.setItem(RATE_LIMIT_KEY, String(attempts));
			if (attempts >= MAX_ATTEMPTS) {
				const lockedUntil = Date.now() + LOCKOUT_MINUTES * 60 * 1000;
				sessionStorage.setItem(LOCKOUT_KEY, String(lockedUntil));
			}
			return attempts;
		}

		function resetAttempts() {
			sessionStorage.removeItem(RATE_LIMIT_KEY);
			sessionStorage.removeItem(LOCKOUT_KEY);
		}

		function isLockedOut() {
			const { lockedUntil } = getRateLimit();
			if (lockedUntil && Date.now() < lockedUntil) return true;
			if (lockedUntil && Date.now() >= lockedUntil) {
				resetAttempts(); // lockout expired
			}
			return false;
		}

		function showError(msg) {
			errorBox.textContent = msg;
			errorBox.style.display = 'block';
			successBox.style.display = 'none';
		}

		function showSuccess(msg) {
			successBox.textContent = msg;
			successBox.style.display = 'block';
			errorBox.style.display = 'none';
		}

		function isTokenExpired(token) {
			try {
				const payload = JSON.parse(atob(token.split('.')[1]));
				const expMs = payload.exp * 1000;
				return Date.now() >= (expMs - 30000); // 30s early
			} catch (_) {
				return true;
			}
		}

		// If already authenticated, go straight to dashboard
		(function autoRedirectIfLoggedIn() {
			const token   = localStorage.getItem('supabase_access_token');
			const session = localStorage.getItem('supabase_session');
			if (token && session && !isTokenExpired(token)) {
				window.location.href = 'admin_dashboard.html';
			}
		})();

		form.addEventListener('submit', async (e) => {
			e.preventDefault();
			errorBox.style.display = 'none';
			successBox.style.display = 'none';

			// Client-side lockout check
			if (isLockedOut()) {
				const { lockedUntil } = getRateLimit();
				const mins = Math.ceil((lockedUntil - Date.now()) / 60000);
				showError(`Too many failed attempts. Try again in ${mins} minute(s).`);
				return;
			}

			submitBtn.disabled = true;
			submitBtn.innerHTML = '<span class="spinner"></span> Establishing Session...';

			const email    = document.getElementById('email').value.trim();
			const password = document.getElementById('password').value;

			if (!email || !password) {
				showError('Email and password are required.');
				submitBtn.disabled = false;
				submitBtn.textContent = 'Sign In to Dashboard';
				return;
			}

			// Basic email format check
			if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
				showError('Please enter a valid email address.');
				submitBtn.disabled = false;
				submitBtn.textContent = 'Sign In to Dashboard';
				return;
			}

			try {
				const { data, error } = await supabase.auth.signInWithPassword({ email, password });
				if (error) throw error;

				const session = data.session;
				if (!session?.access_token) {
					throw new Error('No session returned from Supabase.');
				}

				// Success: reset rate limit counter
				resetAttempts();

				// Persist for dashboard guard (matches `admin_dashboard.html` expectations)
				localStorage.setItem('supabase_access_token', session.access_token);
				localStorage.setItem('supabase_user', JSON.stringify(session.user));
				localStorage.setItem('supabase_session', JSON.stringify(session));

				showSuccess('Login successful. Redirecting…');
				setTimeout(() => {
					window.location.href = 'admin_dashboard.html';
				}, 600);
			} catch (err) {
				// Failed attempt: bump counter
				const attempts = bumpAttempt();
				const remaining = MAX_ATTEMPTS - attempts;
				let msg = err?.message || 'Login failed. Please try again.';
				if (remaining > 0) {
					msg += ` (${remaining} attempt${remaining !== 1 ? 's' : ''} remaining)`;
				} else {
					msg = `Too many failed attempts. You are locked out for ${LOCKOUT_MINUTES} minutes.`;
				}
				console.warn('[Login] Auth failed:', err?.message);
				showError(msg);
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = 'Sign In to Dashboard';
			}
		});
		}
	</script>
</body>
</html>
